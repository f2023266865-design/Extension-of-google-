<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'none'" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Learning Copilot — Minimal</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;background:#071029;color:#fff;padding:14px;width:360px}
      .btn{display:inline-block;padding:10px 14px;border-radius:10px;background:linear-gradient(90deg,#70d6c8,#1f7ae0);color:#07101f;border:none;cursor:pointer}
      .secondary{background:#112233;padding:8px;border-radius:8px;border:1px solid #24354a}
      pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,0.04);padding:10px;border-radius:8px;margin-top:10px}
      .muted{color:#9fb0d0;font-size:12px}
      .small{font-size:12px}
    </style>
  </head>
  <body>
    <h3>AI Learning Copilot — Minimal</h3>
    <p class="muted small">No build required. Extracts page text and optionally calls your backend API.</p>

    <div style="margin-top:10px">
      <button id="explainBtn" class="btn">Explain Page</button>
      <button id="historyBtn" class="secondary" style="margin-left:8px">History</button>
    </div>

    <div id="status" class="muted small" style="margin-top:8px">Ready</div>

    <pre id="output">No explanation yet.</pre>

    <script src="popup.js"></script>
  </body>
</html>
